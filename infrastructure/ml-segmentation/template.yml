AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  menudigital-ml-segmentation

  SAM Template for MenuQR ML Segmentation Lambda function

Globals:
  Function:
    Timeout: 300
    MemorySize: 256
    Runtime: python3.10

Resources:
  MLSegmentationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: lambda_function.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: menudigital-events
        - DynamoDBCrudPolicy:
            TableName: menudigital-segments
      Environment:
        Variables:
          EVENTS_TABLE: menudigital-events
          SEGMENTS_TABLE: menudigital-segments
      Events:
        NightlySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 3 * * ? *)
            Name: NightlyMLSegmentation
            Description: Runs K-Means clustering for customer segmentation nightly at 3AM UTC
